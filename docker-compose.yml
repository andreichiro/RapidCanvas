# One-command Docker stack: UI, API, Qdrant, and MLflow.
services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - timeout 5 bash -c '</dev/tcp/127.0.0.1/6333'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mlflow:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - uv
      - run
      - mlflow
      - ui
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - file:/mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow-runs:/mlflow/mlruns
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      MLFLOW_TRACKING_URI: http://mlflow:5000
      QDRANT_URL: http://qdrant:6333
    volumes:
      - backend-cache:/app/backend/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

volumes:
  backend-cache:
  mlflow-runs:
  qdrant-storage:
